# Server
server.port=8080

# Datenbank
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/werwolf_wiki}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:wiki_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hier_passwort_eintragen}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Wiki Passwort (hier ändern!)
wiki.password=${WIKI_PASSWORD:duesterwald2026}

# JWT Konfiguration
jwt.secret=${JWT_SECRET:hier_secret_eintragen}
jwt.expiration=86400000
